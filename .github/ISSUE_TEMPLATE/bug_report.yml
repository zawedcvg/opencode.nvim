name: Bug Report
description: File a bug/issue
title: "bug: "
labels: [bug]
body:
  - type: checkboxes
    attributes:
      options:
        - label: I searched the docs
          required: true
        - label: I searched existing issues
          required: true
  - type: textarea
    attributes:
      label: "`:checkhealth opencode` output"
    validations:
      required: true
  - type: textarea
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is. Please include any related errors you see in Neovim.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1.
        2. 
        3.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected Behavior
      description: A concise description of what you expected to happen.
    validations:
      required: true
